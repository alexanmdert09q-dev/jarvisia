<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | ONLINE</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .mainframe { width: 400px; border: 2px solid #00f2ff; padding: 20px; border-radius: 15px; background: #000; box-shadow: 0 0 20px #00f2ff; }
        #chat-log { height: 300px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        .input-area { display: flex; gap: 5px; }
        input { flex: 1; background: #111; border: 1px solid #00f2ff; color: #fff; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #00f2ff; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .jarvis { color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="mainframe">
    <h3 style="text-align:center;">J.A.R.V.I.S.</h3>
    <div id="chat-log">
        <div><span class="jarvis">SISTEMA:</span> Alexander, núcleo sincronizado. ¿Qué desea?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Habla con Jarvis...">
        <button onclick="comunicar()">ENVIAR</button>
    </div>
</div>

<script>
    // TU LLAVE (Asegúrate de que no tenga espacios al final)
    const KEY = "AIzaSyDUif3Vd6Z6ii3w2cRvCQjgvTxdvb71iU0";
    
    // RUTA 2026: Usamos v1beta y el nombre completo del modelo
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;

    async function comunicar() {
        const input = document.getElementById('userInput');
        const log = document.getElementById('chat-log');
        const msg = input.value.trim();
        if(!msg) return;

        log.innerHTML += `<div><b>Tú:</b> ${msg}</div>`;
        input.value = "";

        try {
            const response = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Responde muy breve como JARVIS de Iron Man: " + msg }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                log.innerHTML += `<div style="color:orange;">[ERROR]: ${data.error.message}</div>`;
            } else {
                const respuesta = data.candidates[0].content.parts[0].text;
                log.innerHTML += `<div><span class="jarvis">J.A.R.V.I.S.:</span> ${respuesta}</div>`;
            }
        } catch (e) {
            log.innerHTML += `<div style="color:red;">[ERROR DE ENLACE]</div>`;
        }
        log.scrollTop = log.scrollHeight;
    }
    
    // Para enviar con Enter
    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') comunicar(); };
</script>

</body>
</html>
