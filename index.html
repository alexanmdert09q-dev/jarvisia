<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>J.A.R.V.I.S. | PROTOCOLO DE REDUNDANCIA</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { width: 450px; border: 2px solid #00f2ff; padding: 25px; background: rgba(0, 5, 10, 0.95); box-shadow: 0 0 25px #00f2ff66; border-radius: 10px; }
        #chat { height: 350px; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #004444; padding: 10px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #00f2ff; color: #fff; padding: 10px; outline: none; }
        button { background: #00f2ff; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .jarvis-label { color: #00f2ff; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="terminal">
    <h3 style="text-align: center; letter-spacing: 4px;">J.A.R.V.I.S.</h3>
    <div id="chat">
        <div style="color: #444;">[SISTEMA]: Enrutando vía servidor seguro...</div>
        <div><span class="jarvis-label">J.A.R.V.I.S.:</span> Alexander, el sistema está en espera. ¿Qué desea, señor?</div>
    </div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Escriba aquí..." autocomplete="off">
        <button onclick="ejecutar()">ENVIAR</button>
    </div>
</div>

<script>
    const KEY = "AIzaSyDUif3Vd6Z6ii3w2cRvCQjgvTxdvb71iU0";
    
    // Lista de rutas posibles (Google está cambiando esto constantemente)
    const rutas = [
        `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`,
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`
    ];

    async function ejecutar() {
        const input = document.getElementById('userInput');
        const log = document.getElementById('chat');
        const prompt = input.value.trim();
        if(!prompt) return;

        log.innerHTML += `<div style="margin-top:10px;"><b>Alexander:</b> ${prompt}</div>`;
        input.value = "";
        log.scrollTop = log.scrollHeight;

        let respondido = false;

        for (let url of rutas) {
            if (respondido) break;
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Eres Jarvis de Iron Man. Responde breve a Alexander: " + prompt }] }]
                    })
                });

                const data = await res.json();
                
                if (!data.error && data.candidates) {
                    const text = data.candidates[0].content.parts[0].text;
                    log.innerHTML += `<div style="margin-top:10px;"><span class="jarvis-label">J.A.R.V.I.S.:</span> ${text}</div>`;
                    respondido = true;
                }
            } catch (e) {
                console.log("Error en ruta, intentando la siguiente...");
            }
        }

        if (!respondido) {
            log.innerHTML += `<div style="color:orange; margin-top:10px;">[SISTEMA]: Google no reconoce el modelo actual. Probablemente la cuota gratuita de su llave se agotó por hoy o su región requiere verificación de identidad.</div>`;
        }
        log.scrollTop = log.scrollHeight;
    }

    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') ejecutar(); };
</script>

</body>
</html>
